<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0a0c0f"/>
  <title>BusCádiz</title>
  <link href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0c0f;--surface:#13161b;--surface2:#1c2028;--surface3:#242830;
      --border:rgba(255,255,255,0.08);--accent:#3b82f6;--accent-dim:rgba(59,130,246,0.15);
      --text:#e8eaf0;--text-muted:#6b7280;--text-dim:#9ca3af;--radius:16px;
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;width:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    #map{position:absolute;inset:0;touch-action:pan-x pan-y}

    /* LOADING */
    #loading{position:absolute;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .5s ease}
    #loading.done{opacity:0;pointer-events:none}
    .loader-logo{font-size:32px;font-weight:600;letter-spacing:-.5px}
    .loader-logo span{color:var(--accent)}
    .loader-bar{width:160px;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .loader-fill{height:100%;background:var(--accent);border-radius:2px;width:0;transition:width .3s ease}
    .loader-text{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;text-align:center;padding:0 32px}

    /* TOP PILL */
    #toppill{
      position:absolute;top:calc(var(--safe-top) + 14px);left:50%;transform:translateX(-50%);
      z-index:20;background:rgba(13,16,20,.88);backdrop-filter:blur(24px) saturate(1.6);
      -webkit-backdrop-filter:blur(24px) saturate(1.6);
      border:1px solid var(--border);border-radius:100px;
      padding:9px 18px;display:flex;align-items:center;gap:10px;
      box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap
    }
    .toppill-logo{font-size:14px;font-weight:600;letter-spacing:-.3px}
    .toppill-logo span{color:var(--accent)}
    .toppill-sep{width:1px;height:14px;background:var(--border)}
    .toppill-stat{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
    .toppill-stat b{color:var(--text-dim)}

    /* SEARCH */
    #searchbar{
      position:absolute;top:calc(var(--safe-top) + 64px);left:16px;right:16px;z-index:20;
      background:rgba(13,16,20,.88);backdrop-filter:blur(24px) saturate(1.6);
      -webkit-backdrop-filter:blur(24px) saturate(1.6);
      border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:0 4px 20px rgba(0,0,0,.4);overflow:hidden
    }
    .searchbar-row{display:flex;align-items:center;padding:0 14px}
    .searchbar-icon{color:var(--text-muted);font-size:15px;flex-shrink:0}
    #search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:14px 10px}
    #search-input::placeholder{color:var(--text-muted)}
    #search-clear{display:none;background:var(--surface3);border:none;border-radius:50%;width:22px;height:22px;color:var(--text-muted);font-size:11px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
    #search-clear.visible{display:flex}
    #search-results{display:none;border-top:1px solid var(--border);max-height:50vh;overflow-y:auto}
    #search-results.visible{display:block}
    .search-item{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
    .search-item:last-child{border-bottom:none}
    .search-item:active{background:var(--surface2)}
    .s-icon{width:34px;height:34px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .s-text b{font-size:14px;font-weight:500;color:var(--text);display:block}
    .s-text small{font-size:11px;color:var(--text-muted)}

    /* MAP CONTROLS */
    .maplibregl-ctrl-bottom-right{bottom:calc(var(--safe-bottom) + 290px) !important;right:16px !important}
    .maplibregl-ctrl-group{background:rgba(13,16,20,.88) !important;backdrop-filter:blur(20px);border:1px solid var(--border) !important;border-radius:12px !important;box-shadow:0 4px 16px rgba(0,0,0,.4) !important;overflow:hidden}
    .maplibregl-ctrl-group button{background:transparent !important;border:none !important;width:40px !important;height:40px !important}
    .maplibregl-ctrl-group button+button{border-top:1px solid var(--border) !important}
    .maplibregl-ctrl-compass .maplibregl-ctrl-icon,.maplibregl-ctrl-zoom-in .maplibregl-ctrl-icon,.maplibregl-ctrl-zoom-out .maplibregl-ctrl-icon{filter:invert(1) !important}

    /* LOCATE BTN */
    #locate-btn{
      position:absolute;right:16px;bottom:calc(var(--safe-bottom) + 230px);z-index:20;
      width:46px;height:46px;border-radius:14px;
      background:rgba(13,16,20,.88);backdrop-filter:blur(20px);
      border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
      font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4)
    }
    #locate-btn:active{background:var(--surface2)}

    /* BOTTOM SHEET */
    #sheet{
      position:absolute;left:0;right:0;bottom:0;z-index:30;
      background:var(--surface);border-radius:22px 22px 0 0;
      box-shadow:0 -8px 40px rgba(0,0,0,.6);border-top:1px solid var(--border);
      transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);
      max-height:88vh;display:flex;flex-direction:column
    }
    #sheet.peek{transform:translateY(calc(100% - 104px - var(--safe-bottom)))}
    #sheet.half{transform:translateY(calc(100% - 56vh))}
    #sheet.full{transform:translateY(0)}

    .sheet-handle-area{padding:12px 0 4px;display:flex;justify-content:center;cursor:grab;flex-shrink:0}
    .sheet-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px}

    /* PEEK content */
    #sheet-peek{padding:0 20px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .peek-icon-wrap{width:46px;height:46px;border-radius:14px;background:var(--accent-dim);border:1px solid rgba(59,130,246,.25);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .peek-info b{font-size:15px;font-weight:500;display:block}
    .peek-info span{font-size:12px;color:var(--text-muted)}

    /* FULL content */
    #sheet-full{display:none;flex-direction:column;flex:1;overflow:hidden}
    #sheet.half #sheet-full,#sheet.full #sheet-full{display:flex}
    #sheet.half #sheet-peek,#sheet.full #sheet-peek{display:none}

    .sheet-header{padding:4px 20px 14px;flex-shrink:0}
    .sheet-stop-row{display:flex;align-items:flex-start;gap:12px}
    .sheet-stop-icon{width:46px;height:46px;border-radius:14px;background:var(--accent-dim);border:1px solid rgba(59,130,246,.25);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .sheet-stop-info{flex:1;min-width:0}
    .sheet-stop-id{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:3px}
    .sheet-stop-name{font-size:18px;font-weight:600;letter-spacing:-.4px;line-height:1.2}
    .sheet-stop-meta{font-size:12px;color:var(--text-muted);margin-top:4px}
    .sheet-divider{height:1px;background:var(--border);margin:14px 0 0}

    .sheet-body{flex:1;overflow-y:auto;padding:12px 16px;padding-bottom:calc(var(--safe-bottom) + 24px);-webkit-overflow-scrolling:touch}
    .sheet-body::-webkit-scrollbar{display:none}
    .lines-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);padding:8px 4px 10px}

    /* LINE CARD */
    .line-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;transition:border-color .2s}
    .line-card.expanded{border-color:rgba(59,130,246,.3)}
    .line-header{padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;-webkit-user-select:none;min-height:66px}
    .line-header:active{background:var(--surface3)}
    .line-num{min-width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;flex-shrink:0}
    .line-info{flex:1;min-width:0}
    .line-title{font-size:14px;font-weight:500;line-height:1.3}
    .line-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
    .line-arrow{color:var(--text-muted);font-size:11px;transition:transform .25s;flex-shrink:0;padding:4px}
    .line-card.expanded .line-arrow{transform:rotate(180deg)}
    .line-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
    .line-card.expanded .line-body{max-height:500px;border-top:1px solid var(--border)}
    .sched-inner{padding:14px}
    .sched-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
    .time-grid{display:flex;flex-wrap:wrap;gap:7px}
    .time-chip{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text-dim)}
    .time-chip.next{background:var(--accent-dim);border-color:rgba(59,130,246,.5);color:var(--accent);font-weight:500}
    .time-chip.passed{opacity:.28}
    .no-sched{font-size:13px;color:var(--text-muted);font-style:italic}

    *{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-logo">Bus<span>Cádiz</span></div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="loader-text" id="loader-text">Iniciando mapa…</div>
</div>

<div id="map"></div>

<div id="toppill">

</div>

<div id="searchbar">
  <div class="searchbar-row">
    <span class="searchbar-icon">🔍</span>
    <input id="search-input" type="text" placeholder="Buscar parada o municipio…" autocomplete="off" autocorrect="off"/>
    <button id="search-clear">✕</button>
  </div>
  <div id="search-results"></div>
</div>

<div id="locate-btn">📍</div>

<div id="sheet">

  <div id="sheet-peek">
    <div class="peek-icon-wrap">🚏</div>
    <div class="peek-info">
      <b id="peek-name">Selecciona una parada</b>
      <span id="peek-sub">Toca cualquier punto del mapa</span>
    </div>
  </div>

  <div id="sheet-full">
    <div class="sheet-header">
      <div class="sheet-stop-row">
        <div class="sheet-stop-icon">🚏</div>
        <div class="sheet-stop-info">
          <div class="sheet-stop-id" id="sheet-stop-id">—</div>
          <div class="sheet-stop-name" id="sheet-stop-name">—</div>
          <div class="sheet-stop-meta" id="sheet-stop-meta">—</div>
        </div>
      </div>
      <div class="sheet-divider"></div>
    </div>
    <div class="sheet-body">
      <div class="lines-label">Líneas en esta parada</div>
      <div id="lines-container"></div>
    </div>
  </div>
</div>

// ── STATE ────────────────────────────────────────────────────────
const stops = DATA.stops;
const lines = DATA.lines;
const stopLineMap = DATA.stopLineMap;
let map;

function prog(pct, msg) {
  document.getElementById('loader-fill').style.width = pct + '%';
  document.getElementById('loader-text').textContent = msg;
}

function nowMins() { const d = new Date(); return d.getHours()*60 + d.getMinutes(); }

// ── MAP ──────────────────────────────────────────────────────────
function initMap() {
  prog(10, 'Iniciando mapa…');
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/dark',
    center: [-6.2833, 36.53],
    zoom: 10.5, pitch: 45, bearing: -10, antialias: true
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'bottom-right');
  map.on('load', () => {
    prog(70, 'Pintando paradas…');
    addStopsLayer();
    prog(90, 'Configurando interfaz…');
    setupSearch();
    setupSheet();
    setupLocate();
    document.getElementById('stop-count').textContent = stops.length;
    document.getElementById('line-count').textContent = lines.length;
    prog(100, '¡Listo!');
    setTimeout(() => document.getElementById('loading').classList.add('done'), 300);
  });
  map.on('error', () => {
    // fallback: try another free tile provider
    prog(50, 'Cambiando servidor de mapa…');
  });
}

function addStopsLayer() {
  const features = stops.map(s => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [s.lon, s.lat] },
    properties: { id: s.id, name: s.name, municipio: s.municipio, hasLines: !!(stopLineMap[s.id]?.length) }
  }));

  map.addSource('stops', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features },
    cluster: true, clusterMaxZoom: 13, clusterRadius: 45
  });

  map.addLayer({ id: 'clusters', type: 'circle', source: 'stops', filter: ['has','point_count'],
    paint: {
      'circle-color': ['step',['get','point_count'],'#1d4ed8',10,'#2563eb',30,'#3b82f6'],
      'circle-radius': ['step',['get','point_count'],20,10,26,30,32],
      'circle-opacity': .9, 'circle-stroke-width': 2, 'circle-stroke-color': 'rgba(59,130,246,.3)'
    }
  });
  map.addLayer({ id: 'cluster-count', type: 'symbol', source: 'stops', filter: ['has','point_count'],
    layout: { 'text-field': '{point_count_abbreviated}', 'text-size': 13 },
    paint: { 'text-color': '#fff' }
  });
  map.addLayer({ id: 'stops-glow', type: 'circle', source: 'stops', filter: ['!',['has','point_count']],
    paint: {
      'circle-radius': ['interpolate',['linear'],['zoom'],10,10,15,20],
      'circle-color': '#3b82f6', 'circle-opacity': .1, 'circle-blur': 1
    }
  });
  map.addLayer({ id: 'stops-dot', type: 'circle', source: 'stops', filter: ['!',['has','point_count']],
    paint: {
      'circle-radius': ['interpolate',['linear'],['zoom'],10,4,15,9],
      'circle-color': ['case',['get','hasLines'],'#3b82f6','#4b5563'],
      'circle-stroke-width': 2, 'circle-stroke-color': '#0a0c0f'
    }
  });

  map.on('click', 'stops-dot', e => openStop(e.features[0].properties.id));
  map.on('click', 'clusters', e => {
    const f = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
    map.getSource('stops').getClusterExpansionZoom(f[0].properties.cluster_id, (err, zoom) => {
      if (!err) map.easeTo({ center: f[0].geometry.coordinates, zoom });
    });
  });
  ['stops-dot','stops-glow','clusters'].forEach(l => {
    map.on('mouseenter', l, () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', l, () => map.getCanvas().style.cursor = '');
  });
}

// ── BOTTOM SHEET ─────────────────────────────────────────────────
let sheetState = 'hidden';
const sheet = document.getElementById('sheet');

function setSheet(s) {
  sheetState = s;
  sheet.classList.remove('peek','half','full');
  if (s !== 'hidden') sheet.classList.add(s);
}

let dragStart = null, dragFrom = null;
const handle = document.getElementById('sheet-handle');

handle.addEventListener('touchstart', e => { dragStart = e.touches[0].clientY; dragFrom = sheetState; }, { passive: true });
handle.addEventListener('touchend', e => {
  if (dragStart === null) return;
  const dy = e.changedTouches[0].clientY - dragStart;
  if (dy > 55) {
    if (dragFrom === 'full') setSheet('half');
    else if (dragFrom === 'half') setSheet('peek');
    else setSheet('hidden');
  } else if (dy < -55) {
    if (dragFrom === 'peek') setSheet('half');
    else if (dragFrom === 'half') setSheet('full');
  }
  dragStart = null;
}, { passive: true });

function setupSheet() {
  map.on('click', () => { if (sheetState === 'full') setSheet('half'); });
}

// ── OPEN STOP ────────────────────────────────────────────────────
function openStop(stopId) {
  const stop = stops.find(s => s.id == stopId);
  if (!stop) return;

  document.getElementById('peek-name').textContent = stop.name;
  document.getElementById('peek-sub').textContent = stop.municipio || 'Bahía de Cádiz';
  document.getElementById('sheet-stop-id').textContent = 'Parada ' + stop.id;
  document.getElementById('sheet-stop-name').textContent = stop.name;
  document.getElementById('sheet-stop-meta').textContent = (stop.municipio || 'Bahía de Cádiz');

  const container = document.getElementById('lines-container');
  container.innerHTML = '';

  setSheet('half');
  map.flyTo({ center: [stop.lon, stop.lat], zoom: Math.max(map.getZoom(), 14), pitch: 52, speed: 1.4, offset: [0, 120] });

  const linesForStop = stopLineMap[stop.id] || [];
  if (!linesForStop.length) {
    container.innerHTML = '<div class="no-sched" style="padding:12px 4px">No hay líneas registradas para esta parada.</div>';
    return;
  }
  linesForStop.forEach(line => container.appendChild(makeLineCard(line, stop.id)));
}

function makeLineCard(line, stopId) {
  const lineData = lines.find(l => l.id === line.id);
  const card = document.createElement('div');
  card.className = 'line-card';
  const bg = line.color;
  card.innerHTML = `
    <div class="line-header">
      <div class="line-num" style="background:${bg}22;color:${bg};border:1px solid ${bg}44">${line.num}</div>
      <div class="line-info">
        <div class="line-title">${line.name}</div>
        <div class="line-sub">Línea ${line.num}</div>
      </div>
      <span class="line-arrow">▼</span>
    </div>
    <div class="line-body">
      <div class="sched-inner" id="s-${line.id}">
        <div class="no-sched">Abre para ver horarios</div>
      </div>
    </div>`;
  card.querySelector('.line-header').addEventListener('click', () => {
    const was = card.classList.contains('expanded');
    card.classList.toggle('expanded');
    if (!was) {
      renderSched(line.id, stopId, lineData);
      if (sheetState !== 'full') setSheet('full');
    }
  });
  return card;
}

function renderSched(lineId, stopId, lineData) {
  const wrap = document.getElementById('s-' + lineId);
  if (!lineData?.schedules?.ida) {
    wrap.innerHTML = '<div class="no-sched">Sin horarios disponibles.</div>'; return;
  }
  const times = lineData.schedules.ida;
  const now = nowMins(); let nextDone = false;
  const chips = times.map(t => {
    const [h,m] = t.split(':').map(Number);
    const mins = h*60+m, passed = mins < now;
    const isNext = !passed && !nextDone ? (nextDone=true,true) : false;
    return `<div class="time-chip${isNext?' next':passed?' passed':''}">${t}</div>`;
  }).join('');
  wrap.innerHTML = `<div class="sched-label">Horarios de paso</div><div class="time-grid">${chips}</div>`;
}

// ── SEARCH ───────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const clearBtn = document.getElementById('search-clear');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    clearBtn.classList.toggle('visible', q.length > 0);
    if (q.length < 2) { results.classList.remove('visible'); return; }
    const matches = stops.filter(s =>
      s.name.toLowerCase().includes(q) || s.municipio.toLowerCase().includes(q)
    ).slice(0, 7);
    if (!matches.length) { results.classList.remove('visible'); return; }
    results.innerHTML = matches.map(s =>
      `<div class="search-item" data-id="${s.id}">
        <div class="s-icon">🚏</div>
        <div class="s-text"><b>${s.name}</b><small>${s.municipio || 'Bahía de Cádiz'}</small></div>
      </div>`
    ).join('');
    results.classList.add('visible');
    results.querySelectorAll('.search-item').forEach(el => {
      el.addEventListener('click', () => {
        results.classList.remove('visible');
        input.value = ''; clearBtn.classList.remove('visible'); input.blur();
        openStop(el.dataset.id);
      });
    });
  });
  clearBtn.addEventListener('click', () => {
    input.value = ''; clearBtn.classList.remove('visible');
    results.classList.remove('visible'); input.focus();
  });
  document.addEventListener('touchstart', e => {
    if (!document.getElementById('searchbar').contains(e.target)) {
      results.classList.remove('visible'); input.blur();
    }
  }, { passive: true });
}

// ── LOCATE ───────────────────────────────────────────────────────
function setupLocate() {
  document.getElementById('locate-btn').addEventListener('click', () => {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
      map.flyTo({ center: [pos.coords.longitude, pos.coords.latitude], zoom: 14, pitch: 50, speed: 1.5 });
    });
  });
}

// ── BOOT ─────────────────────────────────────────────────────────
initMap();
</script>
